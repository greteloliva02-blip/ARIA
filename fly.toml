# Fly.io app config — generated template; app name set on first `fly launch`
app = "aria-assistant"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  ARIA_CLOUD = "true"
  PORT = "8080"
  ARIA_DATA_DIR = "/data"
  DB_PATH = "/data/aria.db"
  CHROMA_PATH = "/data/chroma_db"
  GOOGLE_CREDENTIALS_DIR = "/data/google_credentials"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "aria_data"
  destination = "/data"
